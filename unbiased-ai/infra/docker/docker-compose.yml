version: "3.9"

services:
  backend:
    build: ../../backend
    container_name: unbiased_backend
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/.env
    depends_on:
      - db

  frontend:
    build: ../../frontend
    container_name: unbiased_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: unbiased_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unbiased_ai
    ports:
      - "5432:5432"

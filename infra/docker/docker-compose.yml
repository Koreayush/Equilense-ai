version: "3.9"

services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile.api
    container_name: unbiased-ai-api
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../../backend:/app
      - uploads:/tmp/unbiased_ai/uploads
      - reports:/tmp/unbiased_ai/reports
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile.api
    container_name: unbiased-ai-worker
    env_file:
      - ../../backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../../backend:/app
      - uploads:/tmp/unbiased_ai/uploads
      - reports:/tmp/unbiased_ai/reports
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  frontend: 
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: unbiased-ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: unbiased-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unbiased_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: unbiased-ai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  reports: